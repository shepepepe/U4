<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameHub - Registro</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<header>
    <h1>🎮 GameHub</h1>
    <p>La comunidad gamer definitiva</p>
</header>


<main>

<section class="registro">

<h2>Crear cuenta en GameHub</h2>

<form action="https://submit-form.com/8V6rQgcYF" method="POST">

<fieldset>

<legend>Información personal</legend>

<label for="nombre">Nombre completo:</label>
<input 
type="text" 
id="nombre"
name="nombre"
placeholder="Ej: Andrea Itrosi"
autocomplete="name"
required>


<label for="email">Correo electrónico:</label>
<input 
type="email"
id="email"
name="email"
placeholder="ejemplo@gmail.com"
autocomplete="email"
required>


<label for="password">Contraseña:</label>
<input 
type="password"
id="password"
name="password"
placeholder="Crea una contraseña segura"
autocomplete="new-password"
minlength="8"
required>


<label for="edad">Edad:</label>
<input 
type="number"
id="edad"
name="edad"
min="13"
max="100"
required>


<label for="fecha">Fecha de nacimiento:</label>
<input 
type="date"
id="fecha"
name="fecha"
required>

</fieldset>



<fieldset>

<legend>Perfil Gamer</legend>


<label for="usuario">Nombre de usuario:</label>
<input 
type="text"
id="usuario"
name="usuario"
placeholder="Entre 5 y 12 caracteres"
pattern="[A-Za-z0-9]{5,12}"
maxlength="12"
minlength="5"
required>


<label for="pais">País:</label>

<select id="pais" name="pais" required>

<option value="">Selecciona tu país</option>
<option>Argentina</option>
<option>Chile</option>
<option>España</option>
<option>México</option>
<option>Colombia</option>

</select>



<label for="ciudad">Ciudad:</label>

<input 
list="ciudades"
id="ciudad"
name="ciudad"
placeholder="Busca tu ciudad"
required>


<datalist id="ciudades">

<option value="Buenos Aires">
<option value="Córdoba">
<option value="Rosario">
<option value="Mendoza">
<option value="Madrid">
<option value="Santiago">

</datalist>



<p>Género:</p>

<label>
<input 
type="radio"
name="genero"
value="masculino"
required>
Masculino
</label>


<label>
<input 
type="radio"
name="genero"
value="femenino">
Femenino
</label>


<label>
<input 
type="radio"
name="genero"
value="otro">
Otro
</label>



<p>Intereses:</p>


<label>
<input 
type="checkbox"
name="intereses"
value="fps">
FPS
</label>


<label>
<input 
type="checkbox"
name="intereses"
value="rpg">
RPG
</label>


<label>
<input 
type="checkbox"
name="intereses"
value="estrategia">
Estrategia
</label>


<label>
<input 
type="checkbox"
name="intereses"
value="simuladores">
Simuladores
</label>



<label for="bio">Biografía:</label>

<textarea
id="bio"
name="biografia"
placeholder="Cuéntanos sobre tus juegos favoritos..."
maxlength="300"></textarea>


</fieldset>


<button type="submit">
Registrarme
</button>


</form>

</section>



<section class="contacto">


<h2>Soporte técnico</h2>


<form action="https://submit-form.com/EhNDunCE5" method="POST">


<label for="nombreContacto">
Nombre:
</label>

<input 
type="text"
id="nombreContacto"
name="nombre_contacto"
autocomplete="name"
required>



<label for="emailContacto">
Email:
</label>

<input 
type="email"
id="emailContacto"
name="email_contacto"
autocomplete="email"
required>



<label for="motivo">
Motivo de contacto:
</label>


<select 
id="motivo"
name="motivo"
required>

<option value="">
Selecciona un motivo
</option>

<option>
Problema con la cuenta
</option>

<option>
Error del juego
</option>

<option>
Pago y suscripciones
</option>

<option>
Otro
</option>

</select>



<label for="mensaje">
Mensaje:
</label>

<textarea
id="mensaje"
name="mensaje"
placeholder="Describe tu problema..."
required></textarea>



<label>

<input 
type="checkbox"
name="terminos"
required>

Acepto los términos y condiciones

</label>


<button type="submit">
Enviar mensaje
</button>


</form>


</section>


</main>



<footer>

<p>© 2026 GameHub - Comunidad Gamer</p>

</footer>


</body>

</html>
